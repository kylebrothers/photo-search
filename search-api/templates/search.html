<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Search</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; background: #111; color: #eee; }
  h1 { font-size: 1.25rem; }
  #search-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  #query { flex: 1; padding: 0.5rem; font-size: 1rem; }
  button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
  .result { background: #1c1c1c; border-radius: 6px; overflow: hidden; }
  .result img { width: 100%; display: block; aspect-ratio: 1; object-fit: cover; }
  .result-links { display: flex; justify-content: space-between; padding: 0.4rem 0.6rem; font-size: 0.85rem; }
  .result-links a { color: #6cf; text-decoration: none; }
  #status { color: #999; margin-bottom: 1rem; }
</style>
</head>
<body>
  <h1>Photo Search</h1>
  <form id="search-form">
    <input id="query" type="text" placeholder="e.g. Sarah at the beach in Portugal last summer" autocomplete="off">
    <button type="submit">Search</button>
  </form>
  <div id="status"></div>
  <div id="results"></div>

  <script>
    const form = document.getElementById('search-form');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = document.getElementById('query').value.trim();
      if (!query) return;

      status.textContent = 'Searching...';
      results.innerHTML = '';

      const startTime = performance.now();
      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const elapsedMs = Math.round(performance.now() - startTime);
        console.log(`[search] ${elapsedMs}ms, HTTP ${res.status}`);

        const data = await res.json();
        console.log('[search] response:', data);

        if (!res.ok) {
          status.textContent = 'Error: ' + (data.error || 'search failed');
          return;
        }

        status.textContent = `${data.results.length} result(s) — ${elapsedMs}ms`;
        for (const r of data.results) {
          const div = document.createElement('div');
          div.className = 'result';
          div.innerHTML = `
            <a href="${r.view_url}" target="_blank">
              <img src="${r.thumbnail_url}" loading="lazy" alt="">
            </a>
            <div class="result-links">
              <a href="${r.view_url}" target="_blank">View in Immich</a>
              <a href="${r.download_url}">Download</a>
            </div>
          `;
          results.appendChild(div);
        }
      } catch (err) {
        const elapsedMs = Math.round(performance.now() - startTime);
        console.error(`[search] failed after ${elapsedMs}ms:`, err);
        status.textContent = 'Network error — is search-api reachable?';
      }
    });
  </script>
</body>
</html>
