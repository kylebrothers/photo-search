services:
  immich-server:
    build: ./immich-server
    env_file: .env
    environment:
      - IMMICH_MACHINE_LEARNING_URL=${IMMICH_MACHINE_LEARNING_URL}
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload                          # NAS — thumbnails/previews
      - ./immich-server/rclone.conf:/root/.config/rclone/rclone.conf:ro # local only, not committed
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: docker.io/redis:6.2-alpine
    restart: unless-stopped

  postgres:
    # Verify this tag against Immich's current example compose file for
    # :release before first deploy — extension versions drift with Immich.
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data   # local SSD — never NFS
    restart: unless-stopped

  search-api:
    build: ./search-api
    env_file: .env
    environment:
      - IMMICH_URL=http://immich-server:2283
      - IMMICH_DB_DSN=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE_NAME}
    ports:
      - "5000:5000"
    depends_on:
      - immich-server
    restart: unless-stopped
