services:
  immich-server:
    build: ./immich-server
    env_file: .env
    environment:
      - IMMICH_MACHINE_LEARNING_URL=${IMMICH_MACHINE_LEARNING_URL}
      # Immich defaults to expecting its DB host at "database" (matching
      # Immich's own official example compose file's service name). Our
      # Postgres service is named "postgres" instead, so this must be set
      # explicitly or Immich fails with getaddrinfo ENOTFOUND database.
      # Verified against a live deploy 2026-07-07.
      - DB_HOSTNAME=postgres
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    volumes:
      - immich_upload:/usr/src/app/upload                              # NAS, via Docker-native NFS volume — thumbnails/previews
      - ./immich-server/rclone.conf:/root/.config/rclone/rclone.conf:ro # local only, not committed
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped


  redis:
    image: docker.io/redis:6.2-alpine
    restart: unless-stopped


  postgres:
    # Verify this tag against Immich's current example compose file for
    # :release before first deploy — extension versions drift with Immich.
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data   # local SSD bind mount — never NFS, never a Docker NFS volume
    restart: unless-stopped


  search-api:
    build: ./search-api
    env_file: .env
    environment:
      - IMMICH_URL=http://immich-server:2283
      - IMMICH_DB_DSN=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE_NAME}
    ports:
      - "5000:5000"
    depends_on:
      - immich-server
    restart: unless-stopped


volumes:
  # NFS-backed Docker volume — Docker mounts this directly, no host-level
  # /etc/fstab entry needed. Only Immich's own container can see this data;
  # if a future host-side script needs it too, it'll need to run inside a
  # container (e.g. `docker compose run`) mounting the same volume.
  immich_upload:
    driver: local
    driver_opts:
      type: nfs
      device: ":${NAS_THUMBS_PATH}"
      o: "nfsvers=4,addr=${NAS_IP},nolock,soft,rw"
